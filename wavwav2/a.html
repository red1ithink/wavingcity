<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Art Museum Package</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 800px;
        margin: 20px auto;
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
      }
      .product {
        width: calc(25% - 20px);
        margin: 10px;
        background-color: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }
      .product img {
        display: block;
        margin: 0 auto;
        max-width: 100%;
        height: auto;
      }
      .product h2 {
        text-align: center;
        margin-top: 10px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Modern Art Museum Package</h1>
      <div class="product">
        <img src="img/cd.jpg" alt="House Album" />
        <h2>House Album</h2>
      </div>
      <div class="product">
        <img src="img/poster.jpg" alt="Paper Poster" />
        <h2>Paper Poster</h2>
      </div>
      <div class="product">
        <img src="img/keyrings.jpg" alt="Keyring" />
        <h2>Keyring</h2>
      </div>
      <div class="product">
        <img src="img/stiker.jpg" alt="Sticker" />
        <h2>Sticker</h2>
      </div>
    </div>
  </body>
</html>

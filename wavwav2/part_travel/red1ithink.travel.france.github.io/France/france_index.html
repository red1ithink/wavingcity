<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #000;
      overflow: hidden;
    }
    
    .animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(90deg, #f00, #0f0, #00f);
      animation: animate 10s linear infinite;
    }
    
    @keyframes animate {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 100% 0;
      }
    }
  </style>
</head>
<body>
  <div class="animation"></div>
</body>
</html>
